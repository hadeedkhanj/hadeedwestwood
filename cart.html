<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://kit.fontawesome.com/d0811a5363.js" crossorigin="anonymous"></script>
    <title>Hadeed Westwood | Your Cart</title>
  </head>
  <body>

    <nav class="navigation">
      <div class="navbar-center">
        <h1><span class="color">hadeed</span> westwood</h1>
        <div class="auth-buttons">
            <a href="home.html" class="nav-link">Home</a>
            <a href="products.html" class="nav-link">Products</a>
        </div>
        <div class="cart-btn">
          <span class="nav-icon">
            <i class="fas fa-cart-plus"></i>
          </span>
          <div class="cart-items">0</div>
        </div>
      </div>
    </nav>

    <section class="cart-page">
      <div class="section-md">
        <h2 class="pro">Review Your Cart</h2>
      </div>

      <div class="cart-content">
          </div>

      <div class="cart-footer">
        <h3>Your Total : $ <span class="cart-total">0</span></h3>
        <div class="cart-actions">
            <button class="clear-cart banner-btn pointer">Clear Cart</button>
            <a href="checkout.html" class="banner-btn checkout-link">Proceed to Checkout</a>
        </div>
      </div>
    </section>

    <footer>
      <span class="color">Westwood</span> store copyright &copy; 2026
    </footer>

    <script src="script.js"></script>
  </body>
</html>
