!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://kit.fontawesome.com/d0811a5363.js" crossorigin="anonymous"></script>
    <title>Hadeed Westwood | Products</title>
  </head>
  <body>

    <nav class="navigation">
      <div class="navbar-center">
        <h1><span class="color">hadeed</span> westwood</h1>
        
        <div class="auth-buttons">
            <a href="home.html" class="nav-link">Home</a>
            <a href="products.html" class="nav-link">Products</a>
        </div>

        <div class="cart-btn">
          <span class="nav-icon">
            <i class="fas fa-cart-plus"></i>
          </span>
          <div class="cart-items">0</div>
        </div>
      </div>
    </nav>

    <section class="real" style="margin-top: 5rem;">
      <div class="section-md">
        <h3 class="pro">Our Collection</h3>
      </div>
      <article class="products-center container"></article>
    </section>

    <div class="cart-overlay">
      <div class="cart">
        <span class="close-cart">
          <i class="fas fa-window-close"></i>
        </span>
        <h2>Your Cart</h2>
        <div class="cart-content">
            </div>
        <div class="cart-footer">
          <h3>Your Total : $ <span class="cart-total">0</span></h3>
          <button class="clear-cart banner-btn pointer">Clear Cart</button>
          <a href="checkout.html" class="banner-btn" style="
           display: block;
           margin-top: 1rem;
           text-decoration: none;
           text-align: center;">
           Proceed to Checkout</a>
        </div>
      </div>
    </div>

    <footer>
      <span class="color">Westwood</span> store copyright &copy; 2026
    </footer>

    <script src="script.js"></script>
  </body>
</html>
